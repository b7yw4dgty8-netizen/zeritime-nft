databases:
  - name: zeritime-db
    plan: free
    databaseName: zeritime
    user: zeritime

services:
  - type: web
    name: zeritime-nft
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: zeritime-db
          property: connectionString
